{% set name = "nose2" %}
{% set version = "0.16.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 19db5ad20e264501a8ee64e3e157a3766a5e744170e54ceecb4e5ca09b08655a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - nose2 = nose2:discover
    - nose2-{{ python }} = nose2:discover
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python

# Unable to run tests, tox used.
test:
  imports:
    - nose2
    - nose2._toml
    - nose2.events
    - nose2.main
    - nose2.plugins
    - nose2.plugins._constants
    - nose2.plugins.loader
    - nose2.plugins.loader.discovery
    - nose2.plugins.loader.eggdiscovery
    - nose2.plugins.loader.testcases
    - nose2.plugins.loader.testclasses
    - nose2.plugins.mp
    - nose2.suite
    - nose2.tests
    - nose2.tests._common
    - nose2.tools
    - nose2.tools.decorators
    - nose2.tools.params
    - nose2.util
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - nose2 --help
    - nose2-{{ python }} --help
  requires:
    - pip

about:
  home: https://github.com/nose-devs/nose2
  description: The successor to nose, based on unittest2
  summary: nose2 is the next generation of nicer testing for Python
  license: BSD-2-Clause AND BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/nose-devs/nose2
  doc_url: https://docs.nose2.io

extra:
  recipe-maintainers:
    - npavlovikj
